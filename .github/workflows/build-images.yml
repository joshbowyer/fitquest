name: Build + push images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # allow manual run from Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}  # = joshbowyer/fitquest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Log in to ghcr.io. Uses the workflow's built-in GITHUB_TOKEN.
      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch           # branch name (e.g. main)
            type=ref,event=pr               # PR number
            type=semver,pattern={{version}} # v1.2.3 → 1.2.3
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build + push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Skip cache for now — these are small images and GH Actions
          # cache misses are cheaper than cache-hit surprises.
          cache-from: ''
          cache-to: ''