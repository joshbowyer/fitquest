name: Build + push images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # allow manual run from Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}  # = joshbowyer/fitquest

jobs:
  # Per-arch builds push to arch-specific tags (e.g. sha-<hash>-amd64)
  # to avoid overwriting each other's manifest lists. The merge job
  # below combines them into the shared :main / :latest / :sha-<hash>
  # tags as a proper multi-arch manifest list.
  build:
    name: Build ${{ matrix.service }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            # Rollup picks its native binary from
            # @rollup/rollup-linux-{arch}-musl at build time.
            # GH runners are amd64, so amd64 builds use the native
            # x64 binary; arm64 builds cross-compile via QEMU and
            # need the arm64 binary.
            rollup_pkg: '@rollup/rollup-linux-x64-musl'
          - arch: arm64
            platform: linux/arm64
            rollup_pkg: '@rollup/rollup-linux-arm64-musl'
    steps:
      - uses: actions/checkout@v4

      # QEMU + binfmt lets the amd64 runner execute arm64
      # binaries, so docker buildx can cross-compile the arm64
      # images. Slower than native but no other runner is
      # available for free.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Log in to ghcr.io. Uses the workflow's built-in GITHUB_TOKEN.
      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          # Per-arch tags ONLY. Every tag here carries the
          # -${{ matrix.arch }} suffix; the merge job below combines
          # them into the shared :main / :latest / :<version> /
          # :sha-* multi-arch manifest lists. Two rules:
          #   1. Without the arch suffix, two matrix entries pushing
          #      the same tag would race and the later one would
          #      overwrite the earlier manifest list with a
          #      single-arch image (losing the other arch).
          #   2. `enable=amd64-only` unsuffixed tags (the old
          #      approach for branch/semver) are just rule 1 with
          #      extra steps: the merge job then can't find the
          #      -amd64/-arm64 sources it expects. That's why every
          #      v* tag build failed at the merge step (e.g.
          #      "fitquest-api:1.0.22-arm64: not found") — the
          #      semver tag was only ever pushed unsuffixed.
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.arch }}
            type=semver,pattern={{version}},suffix=-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}
            type=sha,prefix=sha-,format=short,suffix=-${{ matrix.arch }}
          # latest=false: with `auto`, semver tag pushes ALSO emit an
          # unsuffixed :latest from BOTH arch builds — the exact
          # single-arch-overwrite race described above (and if the
          # merge job then fails, :latest is left single-arch, which
          # is what production pulls). The merge job is the only
          # writer of :latest.
          flavor: latest=false

      - name: Build + push ${{ matrix.service }} (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ROLLUP_PKG=${{ matrix.rollup_pkg }}
          # Cache scoped per (service, arch) so an arm64 rebuild
          # doesn't pull amd64 layers.
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ matrix.arch }}

  # Merge per-arch tags into the shared manifest-list tags
  # (:main, :latest, :sha-*). Needs: packages: write.
  merge:
    name: Merge ${{ matrix.service }} manifests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve per-arch source tags
        id: src
        # Derive the per-arch suffix used by the build job's tags.
        # The build job's metadata-action suffixes with -amd64 /
        # -arm64; the shared tag (without suffix) is the same
        # value with that suffix stripped.
        # extra_tag: on branch pushes (and manual dispatch) the
        # build job also pushed <branch>-<arch> tags, so the merge
        # job must maintain the shared :<branch> tag too —
        # otherwise :main only ever points at a stale single-arch
        # image.
        run: |
          EXTRA=""
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # v1.2.3 → 1.2.3
            BASE="${GITHUB_REF_NAME#v}"
          else
            BASE="sha-${GITHUB_SHA::7}"
            EXTRA="${GITHUB_REF_NAME}"
          fi
          echo "shared_tag=${BASE}" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${EXTRA}" >> "$GITHUB_OUTPUT"
          echo "amd64_tag=${BASE}-amd64" >> "$GITHUB_OUTPUT"
          echo "arm64_tag=${BASE}-arm64" >> "$GITHUB_OUTPUT"

      # Combine the per-arch manifests into a multi-arch manifest
      # list under the shared tags. `imagetools create` reads the
      # referenced tags, downloads their manifests + layers, and
      # pushes a new manifest-list tag that references both.
      - name: Merge per-arch manifests
        run: |
          set -euo pipefail
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}"
          SHARED_TAG="${{ steps.src.outputs.shared_tag }}"
          EXTRA_TAG="${{ steps.src.outputs.extra_tag }}"
          AMD64_TAG="${{ steps.src.outputs.amd64_tag }}"
          ARM64_TAG="${{ steps.src.outputs.arm64_tag }}"
          TAG_ARGS=(--tag "${IMAGE_BASE}:${SHARED_TAG}" --tag "${IMAGE_BASE}:latest")
          if [[ -n "$EXTRA_TAG" ]]; then
            TAG_ARGS+=(--tag "${IMAGE_BASE}:${EXTRA_TAG}")
          fi
          echo "Merging per-arch manifests into manifest list:"
          echo "  ${IMAGE_BASE}:${AMD64_TAG}"
          echo "  ${IMAGE_BASE}:${ARM64_TAG}"
          echo "As:"
          echo "  ${IMAGE_BASE}:${SHARED_TAG}"
          echo "  ${IMAGE_BASE}:latest"
          if [[ -n "$EXTRA_TAG" ]]; then echo "  ${IMAGE_BASE}:${EXTRA_TAG}"; fi
          docker buildx imagetools create \
            "${TAG_ARGS[@]}" \
            "${IMAGE_BASE}:${AMD64_TAG}" \
            "${IMAGE_BASE}:${ARM64_TAG}"