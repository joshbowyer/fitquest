services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
      POSTGRES_DB: fitquest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitquest"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Skip exposing 5432 externally in production — the api container
    # reaches postgres via the internal docker network. Uncomment
    # only for local debugging.
    # ports:
    #   - "5432:5432"

  api:
    # Pre-built image from GitHub Container Registry. Tag is
    # updated automatically by .github/workflows/build-images.yml
    # on every push to main. Pin to a specific tag (e.g. :sha-abc123)
    # for production deployments where you don't want auto-updates.
    image: ghcr.io/joshbowyer/fitquest-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fitness:fitness@postgres:5432/fitquest
      NODE_ENV: production
      PORT: 3001
      API_HOST: 0.0.0.0
      # Override these in Portainer's "Environment variables" panel
      # or a .env file mounted into the stack. COOKIE_SECRET MUST
      # be set — generate one with: openssl rand -hex 32
      COOKIE_SECRET: ${COOKIE_SECRET}
      # Browser origin for CORS. Set to your public URL.
      # Behind Portainer's edge proxy: https://your-domain.tld
      # Direct (no reverse proxy): http://localhost:3001
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3001}
    # Expose api port only if you're not running a reverse proxy.
    # If using Caddy / nginx / Portainer edge, remove this and the
    # web container's port — the proxy will route traffic.
    ports:
      - "3001:3001"

  web:
    image: ghcr.io/joshbowyer/fitquest-web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    # nginx inside this container proxies /api/* → api:3001.
    # No env vars needed because the build hard-codes API_BASE='/api'
    # (see web/Dockerfile + web/src/lib/api.ts).

  # Optional: Caddy reverse proxy with auto-TLS for production.
  # Enable by uncommenting + running with `docker compose --profile production up`.
  # Or remove this block entirely if you use Portainer's edge proxy.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["production"]
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config: