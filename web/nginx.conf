server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # MIME types. The alpine nginx:1.27 image has been observed
  # to send Content-Type: "" for .js files under some path
  # configurations (likely a regression in how its mime.types
  # regex interacts with our location blocks). Force the correct
  # MIME explicitly so the browser doesn't refuse to execute the
  # module ("blocked because of a disallowed MIME type").
  include /etc/nginx/mime.types;
  types {
    application/javascript js mjs;
    text/css css;
    application/json json;
    image/svg+xml svg;
    font/woff woff;
    font/woff2 woff2;
  }

  # API reverse proxy
  location /api/ {
    proxy_pass http://api:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  # Static assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
