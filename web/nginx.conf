server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Force MIME types explicitly. The alpine nginx:1.27 image
  # has been observed to send Content-Type: "" for some JS
  # assets, which the browser refuses ("blocked because of a
  # disallowed MIME type"). The two-pronged fix:
  #   1. include the packaged mime.types
  #   2. set default_type per-location so a missed mapping falls
  #      back to text/plain instead of empty
  include /etc/nginx/mime.types;
  default_type text/plain;

  # API reverse proxy
  location /api/ {
    proxy_pass http://api:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  # Static assets — force the right MIME per file type since
  # nginx 1.27-alpine has been observed to drop Content-Type
  # on .js files under the default mime.types mapping. We map
  # each asset extension explicitly so a missing mime.types
  # entry doesn't silently break the page.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";

    # Match by extension. Each block sets Content-Type explicitly
    # so even if mime.types is broken, the right type is sent.
    location ~ \.js$ {
      default_type application/javascript;
      add_header Content-Type "application/javascript; charset=utf-8";
      try_files $uri =404;
    }
    location ~ \.mjs$ {
      default_type application/javascript;
      add_header Content-Type "application/javascript; charset=utf-8";
      try_files $uri =404;
    }
    location ~ \.css$ {
      default_type text/css;
      add_header Content-Type "text/css; charset=utf-8";
      try_files $uri =404;
    }
    location ~ \.svg$ {
      default_type image/svg+xml;
      try_files $uri =404;
    }
    location ~ \.woff2?$ {
      default_type font/woff2;
      try_files $uri =404;
    }
    location ~ \.json$ {
      default_type application/json;
      try_files $uri =404;
    }

    # Fallback for any other asset extension. If nothing matches,
    # serve the file with whatever mime.types says, or octet-stream.
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
