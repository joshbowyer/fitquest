services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
      POSTGRES_DB: fitquest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitquest"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
      # Workspace root context — the Dockerfile does `COPY api/...`
      # to scope to its service. Required because npm workspaces share
      # a single root package-lock.json.
      context: .
      dockerfile: ./api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fitness:fitness@postgres:5432/fitquest
      NODE_ENV: production
      PORT: 3001
      API_HOST: 0.0.0.0
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-to-a-long-random-string-min-32-chars}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      WEB_ORIGIN_EXTRA: ${WEB_ORIGIN_EXTRA:-https://localhost,https://fitquest-api.joshbullock.net}
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: ./web/Dockerfile
      # VITE_API_URL is intentionally NOT set so the web's lib/api.ts
      # falls back to '/api' and nginx (in this container) proxies
      # /api/* → api:3001. If you want the browser to hit the API
      # directly (e.g. separate origins), set VITE_API_URL=http://api:3001
      # or your public URL at build time.
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    profiles:
      - production

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
